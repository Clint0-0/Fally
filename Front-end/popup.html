<!DOCTYPE html>
<html>
<head>
<title>ToxiGuard</title>

<style>

body{
    margin:0;
    font-family:"Segoe UI", Arial, sans-serif;
    width:260px;
    background:#f5f5f5;
}

/* Main container with rounded edges */
.container{
    padding:16px;
    border-radius:16px;
}

/* Title */
.title{
    font-size:18px;
    font-weight:600;
    color:#b91c1c;
}

.subtitle{
    font-size:12px;
    color:#666;
    margin-bottom:15px;
}

/* Card */
.card{
    background:white;
    border-radius:16px;
    padding:14px;
    box-shadow:0 6px 14px rgba(0,0,0,0.12);
}

/* Settings row */
.setting{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:12px 0;
    font-size:13px;
}

/* Toggle switch */
.switch{
    position:relative;
    display:inline-block;
    width:38px;
    height:20px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#ccc;
    transition:.3s;
    border-radius:20px;
}

.slider:before{
    position:absolute;
    content:"";
    height:16px;
    width:16px;
    left:2px;
    bottom:2px;
    background:white;
    transition:.3s;
    border-radius:50%;
}

/* Red toggle when enabled */
input:checked + .slider{
    background:#dc2626;
}

input:checked + .slider:before{
    transform:translateX(18px);
}

/* Red button */
button{
    width:100%;
    margin-top:14px;
    padding:9px;
    border:none;
    border-radius:10px;
    font-size:13px;
    font-weight:500;
    color:white;
    background:linear-gradient(135deg,#dc2626,#ef4444);
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<div class="title">ToxiGuard</div>
<div class="subtitle">AI Toxic Content Filter</div>

<div class="card">

<div class="setting">
<span>Parental Control</span>
<label class="switch">
<input type="checkbox" id="parentalControl">
<span class="slider"></span>
</label>
</div>

<div class="setting">
<span>Kid Safe Mode</span>
<label class="switch">
<input type="checkbox" id="kidMode">
<span class="slider"></span>
</label>
</div>

<button id="scanBtn">Rescan Page</button>

</div>

</div>

<script src="popup.js"></script>

</body>
</html>
